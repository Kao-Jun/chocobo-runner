<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chocobo Runner</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="540"></canvas>

  <div id="audiobar">
    <span id="mute" title="Couper le son (M)">🔊</span>
    <span class="ico" title="Volume musique">🎵</span>
    <input id="musicVol" type="range" min="0" max="1" step="0.01" value="0.6" title="Volume de la musique">
    <button id="devSkip" class="dev" title="DEV — passer à 600 pts">▶600</button>
  </div>

  <div id="overlay">
    <h1>🐤 Chocobo Runner</h1>
    <p id="ovmsg">Cours à travers les terres de cristal, saute les obstacles et ramasse les gils&nbsp;!</p>
    <div class="btnrow" id="menuBtns">
      <button data-n="1">1 Joueur</button>
      <button class="blue" data-n="2">2 Joueurs · écran partagé</button>
    </div>
    <div class="btnrow hidden" id="overBtns">
      <button id="againBtn">Rejouer</button>
      <button id="menuBtn" class="lilac">Menu</button>
    </div>
    <div class="legend small" id="controls"></div>
  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
